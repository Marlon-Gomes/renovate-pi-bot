name: "Bug Report"
description: "Report a reproducible issue or unexpected behavior"
title: "[BUG] <short-description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the fields below as completely as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
      placeholder: Short description of the bug
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      description: What part of the project is affected?
      options:
        - Deployment (Docker/Shell)
        - Configuration (config.js)
        - Renovate Execution
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Major
        - Minor
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Always
        - Intermittent
        - Rare
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, versions, branch, toolchain, configuration, etc.
      placeholder: |
        OS:
        Project version / commit:
        Branch:
        Toolchain / runtime:
        Other relevant details:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Logs, stack traces, screenshots, or configuration snippets.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues.
          required: true
        - label: I included environment details.
          required: true
        - label: I can reproduce this consistently (or described when it occurs).
          required: false
